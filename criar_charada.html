<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Enigma</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn-back">← Voltar para as charadas</a>
        
        <div class="form-card">
            <h2 class="title" style="font-size: 1.8rem;">Nova Charada</h2>
            <p class="subtitle">Desafie outros adivinhadores</p>
            
            <div style="margin-top: 1.5rem;">
                <label class="input-label">A Pergunta:</label>
                <input id="input-pergunta" type="text" placeholder="O que é, o que é..." class="input-field">
                
                <label class="input-label">A Resposta:</label>
                <input id="input-resposta" type="text" placeholder="A solução..." class="input-field">
                
                <button id="btn-salvar" class="btn btn-primary" style="margin-top: 1rem;"> Salvar charada</button>
            </div>
            
            <div class="tip-box" style="margin-top: 20px; padding: 15px; background: rgba(251,191,36,0.1); border-radius: 10px; font-size: 0.8rem;">
                <strong>Dica:</strong> Charadas curtas e rimadas são as mais poderosas! Use a criatividade para criar enigmas que desafiem a mente dos outros. Evite respostas muito óbvias para manter o mistério vivo!
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
